<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" type="text/css" href="./css/styles.css">
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
     <link rel="icon" type="image/png" sizes="32x32" href="favicon32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon16.png">
	<title>Perfil</title>
</head>
<body class="page-white">
	<header class="home-recipes">
		<div class="menu">
            <ul>
                <li><a href="./home.html">Inicio</a></li>
                <li><a href="./home-recipes.html">Recetas</a></li>
                <li><a href="./progress.html">Progreso</a></li>
                <li><a href="./recipes.html">Nutria Bot</a></li>
                <li><a href="./profile.html">Perfil</a></li>
                <li><a class="logout" href="">Salir</a></li>
            </ul>      
        </div>  
	</header>
	<main>
		<div class="content login">
			<div class="card">
				<div class="profile-panel">
					<div class="setup_header">
				        <span><i class="fa-regular fa-user"></i></span>
			        </div>
					<form method="" action="" class="profile-form">
                        <div class="form-content">
                            <div class="profile-field">
                                <div>
                                    <i class="fa-solid fa-venus-mars"></i>
                                    <input type="text" name="sexo" id="sexo" value="" readonly>
                                </div>
                                <div>
                                    <i class="fa-solid fa-cake-candles"></i>
                                    <input type="number" name="edad" id="edad" value="" readonly>
                                </div>
                                <div>
                                    <i class="fa-solid fa-ruler-vertical"></i>
                                    <input type="number" name="altura" id="altura" value="" readonly>
                                </div>
                                <div>
                                    <i class="fa-solid fa-weight-scale"></i>
                                    <input type="number" name="peso-inicial" id="peso-inicial" value="" readonly>
                                </div>                            
                            </div>
                            <div class="profile-field">
                                <div>
                                    <i class="fa-solid fa-weight-scale"></i>
                                    <input type="number" name="peso" id="peso" value="" readonly>
                                </div>
                                <div>
                                    <i class="fa-solid fa-award"></i>
                                    <input type="text" name="objetivo" id="objetivo" value="" readonly>
                                </div>
                                <div>
                                    <i class="fa-solid fa-dumbbell"></i>
                                    <input type="text" name="activity" id="activity" value="" readonly>
                                </div>
                                <div>
                                    <i class="fa-solid fa-utensils"></i>
                                    <input type="text" name="diet" id="diet" value="" readonly>
                                </div>
                            </div>
                        </div>
                         <button type="submit">Editar perfil</button>
					</form>
					<div class="setup_footer"></div>
				</div>
            </div>
        </div>
    </main>
<footer></footer>
</body>
</html>
