<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" type="text/css" href="./css/styles.css">
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
	<title>¿Cómo deseas conseguirlo?</title>
</head>
<body class="page-gradient">
	<header>
		<div class="btn_session">
			<a class="profile" href="">boton perfil</a>
			<a class="logout" href="">boton logout</a>
		</div>
	</header>
	<main>
		<div class="content setup">
			<div class="setup_header">
				<span><i class="fa-solid fa-star"></i></span>
				<p>¿Cuál es tu objetivo?</p>
			</div>
			<form action="/guardar-objetivo" method="POST">
				<div class="goal">
					<label class="goal_card">
						<input type="radio" name="objetivo" value="plan">
						<span><i class="fa-regular fa-clipboard"></i></span>
						<div>
							<span>Necesito un plan nutricional</span>
							<p>Necesito guía para las comidas. No sé qué comer.</p> 
						</div>
					</label>

					<label class="goal_card">
						<input type="radio" name="objetivo" value="contar_calorias">
						<span><i class="fa-solid fa-scale-balanced"></i></span>
						<div>
							<span>Necesito contar calorias</span>
							<p>Sé que debo comer. Necesito conocer las calorias que consumo.</p> 
						</div>
					</label>
				</div>
				<button type="submit">Siguiente</button>
			</form>
		</div>
	</main>
	<footer></footer>
</body>
</html>
