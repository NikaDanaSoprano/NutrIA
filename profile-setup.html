<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" type="text/css" href="./css/styles.css">
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
	<link rel="icon" type="image/png" sizes="32x32" href="favicon32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon16.png">
	<title>Configuración - Perfil</title>
</head>
<body class="page-gradient">
	<header>
		<div class="menu">
            <ul>
                <li><a href="./home.html">Inicio</a></li>
                <li><a href="./home-recipes.html">Recetas</a></li>
                <li><a href="">Estadísticas</a></li>
                <li><a href="./recipes.html">Nutria Bot</a></li>
                <li><a href="">Configuración</a></li>
                <li><a class="logout" href="">Salir</a></li>
            </ul>      
        </div>  
	</header>
	<main>
		<div class="content login profile_setup">
			<div class="card">
				<div class="panel">
					<div class="setup_header">
				        <span><i class="fa-regular fa-user"></i></span>
			        </div>
					<form method="" action="">
						<div>
							<i class="fa-solid fa-venus-mars"></i>
							<input type="text" name="sexo" id="sexo" placeholder="Sexo" readonly>
						</div>
						<div>
							<i class="fa-solid fa-cake-candles"></i>
							<input type="number" name="edad" id="edad" placeholder="Edad" readonly>
						</div>
                        <div>
							<i class="fa-solid fa-ruler-vertical"></i>
							<input type="number" name="altura" id="altura" placeholder="Altura" readonly>
						</div>
                        <div>
							<i class="fa-solid fa-weight-scale"></i>
							<input type="number" name="peso" id="peso" placeholder="Peso" readonly>
						</div>
						<button type="submit">Continuar</button>
					</form>
					<div class="setup_footer"></div>
				</div>
				<div class="modal">
					<div class="modal-header">
						<div class="step ">Sexo</div>
						<div class="step ">Edad</div>
						<div class="step active">Altura</div>
						<div class="step">Peso</div>
					</div>
					<div class="modal-body">
						<div class="modal-step step-sexo ">
							<button type="button" data-value="mujer">Mujer</button>
							<button type="button" data-value="hombre">Hombre</button>
						</div>
						<div class="modal-step step-edad ">
							<div class="selector">
								<button class="menos" type="button">−</button>
								<div class="display">18</div>
								<button class="mas" type="button">+</button>
							</div>
							<span class="unidad">años</span>
						</div>

						<div class="modal-step step-altura active">
							<div class="selector">
								<button type="button">−</button>
								<div class="display">170</div>
								<button type="button">+</button>
							</div>
							<span class="unidad">cm</span>
						</div>

						<div class="modal-step step-peso">
							<div class="selector">
								<button type="button">−</button>
								<div class="display">65</div>
								<button type="button">+</button>
							</div>
							<span class="unidad">kg</span>
						</div>

					</div>

					<div class="modal-footer">
						<button type="button" class="btn-next">Continuar</button>
					</div>

				</div>
			</div>
		</div>
	</main>
	<footer></footer>
</body>
</html>
