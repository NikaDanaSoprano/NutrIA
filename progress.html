<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" type="text/css" href="./css/styles.css">
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
     <link rel="icon" type="image/png" sizes="32x32" href="favicon32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon16.png">
	<title>Progreso</title>
</head>
<body class="page-white">
	<header class="home-recipes">
		<div class="menu">
            <ul>
                <li><a href="./home.html">Inicio</a></li>
                <li><a href="./home-recipes.html">Recetas</a></li>
                <li><a href="./progress.html">Progreso</a></li>
                <li><a href="./recipes.html">Nutria Bot</a></li>
                <li><a href="./profile.html">Perfil</a></li>
                <li><a class="logout" href="">Salir</a></li>
            </ul>      
        </div>  
	</header>
	<main>
		<div class="content-progress">
            <div class="header-progress">
                <h2>Tu progreso</h2>
            </div>
            <div class="progress">
                <div class="progress-options">
                    <div class="progress-card">
                        <div class="card-header">
                            <i class="fa-solid fa-chart-line"></i>
                            <h3>Objetivo de usuario</h3>
                        </div>
                        <div class="data-bar">
                            <div class="progress-values">
                                <span>peso inicial</span>
                                <span>Peso objetivo</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width:40%"></div>
                            </div>
                        </div>
                        <div>
                            <button class="btn-progress">Ver progreso</button>
                        </div>
                    </div>
                </div>     
                <div class="progress-options">
                    <div class="progress-card">
                        <div class="card-header">
                            <i class="fa-solid fa-bullseye"></i>
                            <h3>Tus datos</h3>
                        </div>
                        <div class="data-bar">
                            <table>
                                <th>Fecha</th>
                                <th>Peso</th>
                                <tr>
                                    <td>1/1/2026</td>
                                    <td>80 kg</td>
                                </tr>
                            </table>
                        </div>
                        <div>
                            <a href="./profile.html">Añade nuevo peso</a>
                        </div>
                    </div>
                </div>
            </div>           
        </div>
	</main>
	<footer></footer>
</body>
</html>
