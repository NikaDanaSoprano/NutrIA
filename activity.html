<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" type="text/css" href="./css/styles.css">
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon16.png">
	<title>Configuración - Actividad física</title>
</head>
<body class="page-gradient">
	<header>
		<div class="menu">
            <ul>
                <li><a href="./home.html">Inicio</a></li>
                <li><a href="./home-recipes.html">Recetas</a></li>
                <li><a href="./progress.html">Progreso</a></li>
                <li><a href="./recipes.html">Nutria Bot</a></li>
                <li><a href="./profile.html">Perfil</a></li>
                <li><a class="logout" href="">Salir</a></li>
            </ul>      
        </div>  
	</header>
	<main>
		<div class="content login profile_setup">
			<div class="card">
				<div class="panel">
					<div class="setup_header">
				        <span><i class="fa-solid fa-dumbbell"></i></span>
			        </div>
					<form method="" action="">
						<div class="level-bars level-1">
                            <span></span>
                            <span></span>
                            <span></span>
                            <span></span>
                            <span></span>
                         <label class="level-txt" for="level-1">
                            <input type="text" id="level-1" name="sedentario" data-value="sedentario" placeholder="Sedentario" readonly>
                                Poco o nada ejercicio
                            </label>
                        </div>
						<div class="level-bars level-2">
                            <span></span>
                            <span></span>
                            <span></span>
                            <span></span>
                            <span></span>
                         <label class="level-txt" for="level-2">
                            <input type="text" id="level-2" name="ligero" data-value="ligero" placeholder="Ligeramente Activo" readonly>
                                Ejercicio 2 a 3 días por semana
                            </label>
                        </div>
                        <div class="level-bars level-3">
                            <span></span>
                            <span></span>
                            <span></span>
                            <span></span>
                            <span></span>
                         <label class="level-txt" for="level-3">
                            <input type="text" id="level-3" name="moderado" data-value="moderado" placeholder="Moderadamente Activo" readonly>
                                Ejercicio 4 a 5 días por semana
                            </label>
                        </div>
                        <div class="level-bars level-4">
                            <span></span>
                            <span></span>
                            <span></span>
                            <span></span>
                            <span></span>
                         <label class="level-txt" for="level-4">
                            <input type="text" id="level-4" name="activo" data-value="activo" placeholder="Muy alta" readonly>
                                Ejercicio 6 a 7 días por semana
                            </label>
                        </div>
                        <div class="level-bars level-5">
                            <span></span>
                            <span></span>
                            <span></span>
                            <span></span>
                            <span></span>
                         <label class="level-txt" for="level-5">
                            <input type="text" id="level-5" name="atleta" data-value="atleta" placeholder="Atleta profesional" readonly>
                                Ejercicio 6 a 7 días por semana
                            </label>
                        </div>
						<button type="submit">Continuar</button>
					</form>
					<div class="setup_footer"></div>
				</div>
			</div>
		</div>
	</main>
	<footer></footer>
</body>
</html>
