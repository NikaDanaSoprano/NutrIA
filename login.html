<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" type="text/css" href="./css/styles.css">
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
	<title>Login</title>
</head>
<body class="page-white">
	<header>
		<div class="btn_session">
			<a class="profile" href="">boton perfil</a>
			<a class="logout" href="">boton logout</a>
		</div>
	</header>
	<main>
		<div class="content login">
			<div class="card">
				<div class="panel">
					<div class="login_header">
						<h4>¡hola!</h4>
						<p>Que bueno tenerte de regreso en NutrIA</p>
					</div>
					<form method="" action="">
						<div>
							<i class="fa-solid fa-envelope"></i>
							<input type="email" name="email" id="email" placeholder="Email">
						</div>
						<div>
							<i class="fa-solid fa-lock"></i>
							<input type="password" name="password" id="password" placeholder="Contraseña">
						</div>
						<button type="submit">Entar</button>
					</form>
					<div class="login_footer">
						<p>¿No tienes una cuenta? <a href="">Crear cuenta</a>. Accede como <a href="">Invitado.</a></p>
						<p>Si tienes problemas para acceder a tu cuenta, <a href="">contacta</a> con nosotros</p>
					</div>
				</div>
			</div>
		</div>
	</main>
	<footer></footer>
</body>
</html>
