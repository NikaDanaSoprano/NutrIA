<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" type="text/css" href="./css/styles.css">
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
	<link rel="icon" type="image/png" sizes="32x32" href="favicon32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon16.png">
	<title>Registro</title>
</head>
<body class="page-white">
	<header>
		<div class="menu">
            <ul>
                <li><a href="./home.html">Inicio</a></li>
                <li><a href="./home-recipes.html">Recetas</a></li>
                <li><a href="./progress.html">Progreso</a></li>
                <li><a href="./recipes.html">Nutria Bot</a></li>
                <li><a href="./profile.html">Perfil</a></li>
                <li><a class="logout" href="">Salir</a></li>
            </ul>      
        </div>  
	</header>
	<main>
		<div class="content login">
			<div class="card">
				<div class="panel">
					<div class="login_header">
						<h4>¡bienvenid@!</h4>
						<p>Nos alegra que te unas a NutrIA</p>
					</div>
					<form method="post" action="">
						<div>
							<i class="fa-solid fa-user"></i>
							<input type="text" name="nombre" id="nombre" placeholder="Nombre">
						</div>
						<div>
							<i class="fa-solid fa-user-astronaut"></i>
							<input type="text" name="usuario" id="usuario" placeholder="Usuario">
						</div>
						<div>
							<i class="fa-solid fa-envelope"></i>
							<input type="email" name="email" id="email" placeholder="Email">
						</div>
						<div>
							<i class="fa-solid fa-lock"></i>
							<input type="password" name="password" id="password" placeholder="Contraseña">
						</div>
						<button type="submit">Crear cuenta</button>
					</form>
					<div class="login_footer">
						<p>¿Ya tienes cuenta? <a href="">Inicia sesión</a></p>
					</div>
				</div>
			</div>
		</div>
	</main>
	<footer></footer>
</body>
</html>
